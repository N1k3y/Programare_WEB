<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
"http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<title>Înregistrare</title>
</head>

<body>

<h1 align="center">Formular Înregistrare</h1>

<form action="#" method="post">

<fieldset>
<legend>Date personale</legend>

Nume: <input type="text" name="nume"><br><br>
Prenume: <input type="text" name="prenume"><br><br>
Email: <input type="text" name="email"><br><br>
Parolă: <input type="password" name="parola"><br><br>
Confirmare parolă: <input type="password" name="confirmare"><br><br>

Școală: <input type="text" name="scoala"><br><br>

Județ:
<select name="judet">
<option value="cluj">Cluj</option>
<option value="timis">Timiș</option>
<option value="iasi">Iași</option>
</select>
<br><br>

Clasă:
<input type="radio" name="clasa" value="9"> IX
<input type="radio" name="clasa" value="10"> X
<input type="radio" name="clasa" value="11"> XI
<input type="radio" name="clasa" value="12"> XII
<br><br>

Arii:
<input type="checkbox" name="arie1"> Algebră
<input type="checkbox" name="arie2"> Geometrie
<input type="checkbox" name="arie3"> Numere
<input type="checkbox" name="arie4"> Combinatorică
<br><br>

Concursuri țintă:
<select name="concursuri" multiple size="3">
<option>Județeană</option>
<option>Națională</option>
<option>Balcaniadă</option>
</select>
<br><br>

Descriere obiective:<br>
<textarea name="descriere" rows="4" cols="40"></textarea>
<br><br>

<input type="checkbox" name="regulament"> Accept regulamentul
<br><br>

<input type="submit" value="Înregistrare">

</fieldset>

</form>

</body>
</html>
