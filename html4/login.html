<html>
<head>
<title>Login</title>
</head>

<body>

<h1 align="center">Autentificare</h1>

<form action="#" method="post">

<fieldset>
<legend>Date autentificare</legend>

<p>Username: <input type="text" name="username" size="20" maxlength="30"></p>

<p>Parolă: <input type="password" name="parola" size="20"></p>

<input type="radio" name="tip" value="elev"> Elev
<input type="radio" name="tip" value="profesor"> Profesor
</p>

<p>
<input type="checkbox" name="remember" checked> Ține-mă minte
</p>

<p>
<input type="submit" value="Login">
</p>

</fieldset>

</form>

</body>
</html>
