<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="validation.js"></script>
<title>Înregistrare</title>
</head>
<body>

<header>
    <h1>Formular Înregistrare</h1>
    <div class="windows-menu-container">
    <input type="checkbox" id="start-menu-toggle" class="css-checkbox">
    <label for="start-menu-toggle" class="start-button">
        <span class="icon">&#9883;</span> Start
    </label>

    <nav class="vertical-menu">
        <ul class="menu-items">
            <li><a href="index.html">Home</a></li>
            
            <li>
                <input type="checkbox" id="submenu-toggle-1" class="css-checkbox">
                <label for="submenu-toggle-1" class="menu-item-label">Subiecte &#9662;</label>
                
                <ul class="submenu">
                    <li><a href="subiecte.html">Arhivă Subiecte</a></li>
                    <li><a href="add_edit.html">Adaugă/Editează (Admin)</a></li>
                </ul>
            </li>
            
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="https://www.w3schools.com" target="_blank" title="Tutoriale HTML">Resurse externe</a></li>
        </ul>
    </nav>
</div>
</header>

<hr>

<main>
    <section>
        <form action="#" method="post">
            <fieldset>
                <legend>Date personale pentru învățământul românesc</legend>

                <p>
                    <label for="nume">Nume:</label> <input type="text" id="nume" name="nume" required>
                </p>
                <p>
                    <label for="prenume">Prenume:</label> <input type="text" id="prenume" name="prenume" required>
                </p>
                <p>
                    <label for="email"><i class="fa-solid fa-envelope"></i> Email:</label>
                    <input type="email" id="email" name="email" placeholder="nume@domeniu.com" required>
                </p>
                <p>
                    <label for="telefon"><i class="fa-solid fa-phone"></i> Telefon:</label>
                    <input type="tel" id="telefon" name="telefon" placeholder="(+40) 777 777 777" required>
                </p>
                <p>
                    <label for="data_nasterii"><i class="fa-solid fa-calendar"></i> Data (zz/ll/aaaa):</label>
                    <input type="text" id="data_nasterii" name="data_nasterii" placeholder="31/01/2006" required>
                </p>
                <p>
                    <label for="parola">Parolă:</label> <input type="password" id="parola" name="parola" required>
                </p>
                <p>
                    <label for="confirmare">Confirmare parolă:</label> <input type="password" id="confirmare" name="confirmare" required>
                </p>
                <p>
                    <label for="scoala">Școală:</label> 
                    <input type="text" id="scoala" name="scoala" list="schools">
                    <datalist id="schools">
                        <option value="Colegiul Național Emil Racoviță">
                        <option value="Liceul Teoretic Avram Iancu">
                        <option value="Colegiul Național Mihai Viteazul">
                    </datalist>
                </p>
                <p>
                    <label for="judet"><i class="fa-solid fa-map"></i> Județ:</label>
                    <select id="judet" name="judet">
                        <option value="cluj" selected>Cluj</option>
                        <option value="timis">Timiș</option>
                        <option value="iasi">Iași</option>
                    </select>
                </p>

                <p>
                    <label for="oras"><i class="fa-solid fa-city"></i> Oraș:</label>
                    <select id="oras" name="oras">
                        </select>
                </p>

                <p>
                    Clasă:
                    <label><input type="radio" name="clasa" value="9" required> IX</label>
                    <label><input type="radio" name="clasa" value="10"> X</label>
                    <label><input type="radio" name="clasa" value="11"> XI</label>
                    <label><input type="radio" name="clasa" value="12"> XII</label>
                </p>

                <p>
                    Arii:
                    <label><input type="checkbox" name="arie1"> Algebră</label>
                    <label><input type="checkbox" name="arie2"> Geometrie</label>
                    <label><input type="checkbox" name="arie3"> Numere</label>
                    <label><input type="checkbox" name="arie4"> Combinatorică</label>
                </p>

                <p>
                    <label for="concursuri">Concursuri țintă:</label><br>
                    <select id="concursuri" name="concursuri" multiple size="3">
                        <option>Județeană</option>
                        <option>Națională</option>
                        <option>Balcaniadă</option>
                    </select>
                </p>

                <p>
                    <label for="descriere">Descriere obiective:</label><br>
                    <textarea id="descriere" name="descriere" rows="4" cols="40"></textarea>
                </p>

                <p>
                    <label><input type="checkbox" name="regulament" required> Accept regulamentul</label>
                </p>

                <p>
                    <input type="submit" value="Înregistrare">
                </p>

            </fieldset>
        </form>
    </section>
</main>

<hr>

<footer>
    <p>&copy; 2026 OlimpiadaHub</p>
</footer>

</body>
</html>
