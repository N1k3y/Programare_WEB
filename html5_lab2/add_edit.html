<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Subiecte</title>
</head>
<body>

<header>
    <h1>Administrare Subiecte</h1>
    <div class="windows-menu-container">
    <input type="checkbox" id="start-menu-toggle" class="css-checkbox">
    <label for="start-menu-toggle" class="start-button">
        <span class="icon">&#9883;</span> Start
    </label>

    <nav class="vertical-menu">
        <ul class="menu-items">
            <li><a href="index.html">Home</a></li>
            
            <li>
                <input type="checkbox" id="submenu-toggle-1" class="css-checkbox">
                <label for="submenu-toggle-1" class="menu-item-label">Subiecte &#9662;</label>
                
                <ul class="submenu">
                    <li><a href="subiecte.html">Arhivă Subiecte</a></li>
                    <li><a href="add_edit.html">Adaugă/Editează (Admin)</a></li>
                </ul>
            </li>
            
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="https://www.w3schools.com" target="_blank" title="Tutoriale HTML">Resurse externe</a></li>
        </ul>
    </nav>
</div>
</header>

<hr>

<main>
    <section>
        <form action="#" method="post">
            <p>
                <label for="titlu">Titlu:</label> <input type="text" id="titlu" name="titlu" required>
            </p>

            <p>
                <label for="an">An:</label> 
                <input type="number" id="an" name="an" value="2024" min="1900" max="2100" step="1" required>
            </p>

            <p>
                <label for="etapa">Etapă:</label>
                <select id="etapa" name="etapa">
                    <option>Județeană</option>
                    <option>Națională</option>
                </select>
            </p>

            <p>
                Clasă:
                <label><input type="radio" name="clasa" value="9" required> IX</label>
                <label><input type="radio" name="clasa" value="10"> X</label>
                <label><input type="radio" name="clasa" value="11"> XI</label>
                <label><input type="radio" name="clasa" value="12"> XII</label>
            </p>

            <p>
                <label for="desc_admin">Descriere amănunțită:</label><br>
                <textarea id="desc_admin" name="desc_admin" rows="4" cols="40"></textarea>
            </p>

            <p>
                <label for="admin_log">Status Admin (Read-only):</label>
                <input type="text" id="admin_log" name="admin_log" value="Sistem Activ" readonly>
            </p>

            <p>
                <input type="submit" value="Adaugă">
                <input type="submit" value="Editează">
                <input type="submit" value="Șterge" disabled>
            </p>
        </form>
    </section>
</main>

<hr>

<footer>
    <p>&copy; 2026 OlimpiadaHub</p>
</footer>

</body>
</html>
