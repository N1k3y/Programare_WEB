<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Înregistrare</title>
</head>

<body>

<header>
<h1>Formular Înregistrare</h1>
</header>

<nav>
<a href="index.html">Home</a> |
<a href="subiecte.html">Subiecte</a> |
<a href="login.html">Login</a>
</nav>

<hr>

<main>

<section>
<form action="#" method="post">

<fieldset>
<legend>Date personale</legend>

<p>
<label for="nume">Nume:</label>
<input type="text" id="nume" name="nume" required>
</p>

<p>
<label for="prenume">Prenume:</label>
<input type="text" id="prenume" name="prenume" required>
</p>

<p>
<label for="email">Email:</label>
<input type="email" id="email" name="email" required>
</p>

<p>
<label for="parola">Parolă:</label>
<input type="password" id="parola" name="parola" required>
</p>

<p>
<label for="confirmare">Confirmare parolă:</label>
<input type="password" id="confirmare" name="confirmare" required>
</p>

<p>
<label for="scoala">Școală:</label>
<input type="text" id="scoala" name="scoala">
</p>

<p>
<label for="judet">Județ:</label>
<input list="judete" id="judet" name="judet">
<datalist id="judete">
<option value="Cluj">
<option value="Timiș">
<option value="Iași">
</datalist>
</p>

<p>
Clasă:
<input type="radio" id="cl9" name="clasa" value="9">
<label for="cl9">IX</label>

<input type="radio" id="cl10" name="clasa" value="10">
<label for="cl10">X</label>

<input type="radio" id="cl11" name="clasa" value="11">
<label for="cl11">XI</label>

<input type="radio" id="cl12" name="clasa" value="12">
<label for="cl12">XII</label>
</p>

<p>
Arii:
<input type="checkbox" id="alg" name="arie" value="algebra">
<label for="alg">Algebră</label>

<input type="checkbox" id="geo" name="arie" value="geometrie">
<label for="geo">Geometrie</label>

<input type="checkbox" id="num" name="arie" value="numere">
<label for="num">Numere</label>

<input type="checkbox" id="comb" name="arie" value="combinatorica">
<label for="comb">Combinatorică</label>
</p>

<p>
Concursuri țintă:
<select name="concursuri" multiple>
<option value="judeteana">Județeană</option>
<option value="nationala">Națională</option>
<option value="balcaniada">Balcaniadă</option>
</select>
</p>

<p>
<label for="descriere">Descriere obiective:</label><br>
<textarea id="descriere" name="descriere" rows="4" cols="40"></textarea>
</p>

<p>
<input type="checkbox" id="regulament" name="regulament" required>
<label for="regulament">Accept regulamentul</label>
</p>

<p>
<input type="submit" value="Înregistrare">
</p>

</fieldset>

</form>
</section>

</main>

<footer>
<p>&copy; 2026 OlimpiadaHub</p>
</footer>

</body>
</html>
