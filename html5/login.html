<body>

<header>
    <h1>Autentificare</h1>
    <nav>
        <a href="index.html">Home</a> |
        <a href="subiecte.html">Subiecte</a> |

    </nav>
</header>

<hr>

<main>
    <section>
        <form action="#" method="post">
            <fieldset>
                <legend>Date autentificare</legend>

                <p>
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" size="20" maxlength="30" required>
                </p>

                <p>
                    <label for="parola">Parolă:</label>
                    <input type="password" id="parola" name="parola" size="20" required>
                </p>

                <p>
                    <label><input type="radio" name="tip" value="elev" required> Elev</label>
                    <label><input type="radio" name="tip" value="profesor"> Profesor</label>
                </p>

                <p>
                    <label><input type="checkbox" name="remember" checked> Ține-mă minte până data viitoare</label>
                </p>

                <p>
                    <input type="submit" value="Login">
                </p>
            </fieldset>
        </form>
    </section>
</main>
