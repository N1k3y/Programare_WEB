<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<header>
<h1>Autentificare</h1>
</header>

<nav>
<a href="index.html">Home</a> |
<a href="subiecte.html">Subiecte</a> |
<a href="register.html">Register</a>
</nav>

<hr>

<main>

<section>
<form action="#" method="post">

<fieldset>
<legend>Date autentificare</legend>

<p>
<label for="username">Username:</label>
<input type="text" id="username" name="username" required>
</p>

<p>
<label for="parola">Parolă:</label>
<input type="password" id="parola" name="parola" required>
</p>

<p>
Tip utilizator:
<input type="radio" id="elev" name="tip" value="elev">
<label for="elev">Elev</label>

<input type="radio" id="profesor" name="tip" value="profesor">
<label for="profesor">Profesor</label>
</p>

<p>
<input type="checkbox" id="remember" name="remember">
<label for="remember">Ține-mă minte</label>
</p>

<p>
<input type="submit" value="Login">
</p>

</fieldset>

</form>
</section>

</main>

<footer>
<p>&copy; 2026 OlimpiadaHub</p>
</footer>

</body>
</html>
